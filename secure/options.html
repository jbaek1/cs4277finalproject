<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Summary History (Secure)</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h2 {
        border-bottom: 2px solid #1a7a1a;
        padding-bottom: 6px;
        color: #1a7a1a;
      }
      .banner {
        background: #f0fff0;
        border: 1px solid #1a7a1a;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .controls {
        margin-bottom: 16px;
      }
      button {
        margin-right: 8px;
        padding: 6px 14px;
        cursor: pointer;
      }
      #clearBtn {
        background: #1a7a1a;
        color: #fff;
        border: none;
        border-radius: 3px;
      }
      #refreshBtn {
        border: 1px solid #999;
        border-radius: 3px;
        background: #f5f5f5;
      }
      .entry {
        border: 1px solid #c3e6c3;
        border-radius: 4px;
        padding: 10px 14px;
        margin-bottom: 10px;
        background: #fafff a;
      }
      .entry-meta {
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .entry-url {
        font-size: 12px;
        color: #0055cc;
        word-break: break-all;
        margin-bottom: 6px;
      }
      .entry-summary {
        white-space: pre-wrap;
        font-size: 13px;
      }
      #status {
        font-style: italic;
        color: #555;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h2>Summary History — Secure Extension</h2>
    <div class="banner">
      This history is only accessible from within the extension. Web pages
      cannot request it via <code>postMessage</code>.
    </div>
    <div class="controls">
      <button id="refreshBtn">Refresh</button>
      <button id="clearBtn">Clear History</button>
    </div>
    <div id="entries"></div>
    <div id="status">Loading…</div>
    <script src="options.js"></script>
  </body>
</html>
